services:
  kiro-rs:
    image: ghcr.io/${IMAGE_OWNER:-q3064416092-source}/kiro-rs:${IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: kiro-rs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8990:8990"
    volumes:
      - ./config/:/app/config/
    restart: unless-stopped
